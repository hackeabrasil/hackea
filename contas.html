<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #4f46e5;
            --color-secondary: #14b8a6;
            --color-dark: #070e17;
            --color-bg-card: #151f2e;
            --color-light: #f8fafc;
            --color-success: #10b981;
            --color-error: #ef4444;
            --progress-dot-size: 38px; 
            --progress-line-height: 5px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-dark);
            background-image: radial-gradient(circle at 1px 1px, rgba(30, 41, 59, 0.4) 1px, transparent 0);
            background-size: 20px 20px;
            color: var(--color-light);
            min-height: 100vh;
        }
        body.no-scroll { overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 4px; }
        
        .card-shadow {
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.1), 0 0 5px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .status-success-shadow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.2), 0 0 5px rgba(0, 0, 0, 0.5); }
        .status-error-shadow { box-shadow: 0 0 30px rgba(239, 68, 68, 0.2), 0 0 5px rgba(0, 0, 0, 0.5); }

        .progress-wrapper { position: relative; padding-bottom: 30px; margin-top: 20px; }
        .progress-steps-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 2;
            width: 100%;
        }
        .progress-track {
            position: absolute;
            top: calc(var(--progress-dot-size) / 2 - var(--progress-line-height) / 2);
            left: 0;
            right: 0;
            height: var(--progress-line-height);
            background-color: #334155;
            z-index: 1;
            border-radius: 10px;
        }
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 10px;
            background-color: var(--color-success);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-step { position: relative; width: var(--progress-dot-size); display: flex; flex-direction: column; }
        .progress-dot {
            width: var(--progress-dot-size);
            height: var(--progress-dot-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: var(--color-bg-card); 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .step-label {
            position: absolute;
            top: 100%;
            margin-top: 8px;
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            color: #94a3b8;
        }
        .progress-step:first-child { align-items: flex-start; }
        .progress-step:first-child .step-label { left: 0; text-align: left; }
        .progress-step:last-child { align-items: flex-end; }
        .progress-step:last-child .step-label { right: 0; text-align: right; }
        .progress-step:not(:first-child):not(:last-child) { align-items: center; }
        .progress-step:not(:first-child):not(:last-child) .step-label { left: 50%; transform: translateX(-50%); text-align: center; }

        .dot-passed { background-color: var(--color-success); color: white; }
        .label-passed { color: var(--color-success); font-weight: 700; }
        .dot-current { 
            background-color: var(--color-success); 
            color: white; 
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.4);
            animation: pulse-ring 2s infinite;
        }
        .label-current { color: var(--color-success); font-weight: 800; }
        .dot-pending { background-color: #334155; color: #94a3b8; }
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body onload="initTracker()">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2">
                    <i data-lucide="activity" class="w-6 h-6 text-indigo-500"></i>
                    <span class="text-white font-bold tracking-tight">STATUS DO SISTEMA</span>
                </div>
                <div class="text-xs font-medium text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    Sincronizado: <span id="current-time">--:--</span>
                </div>
            </div>
        </div>
    </header>

    <main class="py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-10">
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Painel de Acompanhamento</h1>
                <p class="text-slate-400 mt-1">Verifique o progresso em tempo real das solicitações via Google Sheets.</p>
            </div>

            <!-- Filtros -->
            <div class="bg-[var(--color-bg-card)] p-5 rounded-2xl shadow-2xl mb-8 border border-slate-800/50">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2 relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="filter-name" placeholder="Buscar por nome ou @usuário..." 
                               class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 outline-none transition" 
                               oninput="applyFilters()">
                    </div>
                    <select id="filter-status" class="py-2.5 px-4 rounded-xl bg-slate-900 text-white border border-slate-700 outline-none cursor-pointer" onchange="applyFilters()">
                        <option value="">Todos os Status</option>
                        <option value="sucesso">Finalizado</option>
                        <option value="recuperar">Recuperando</option>
                        <option value="analise">Em Análise</option>
                        <option value="aguardando">Solicitado</option>
                    </select>
                    <button onclick="clearFilters()" class="py-2.5 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 text-white font-medium transition flex items-center justify-center">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> Limpar
                    </button>
                </div>
            </div>

            <div id="requests-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            
            <div id="no-results" class="hidden text-center p-20 bg-[var(--color-bg-card)] rounded-2xl border border-dashed border-slate-700 mt-8">
                <i data-lucide="search-x" class="w-12 h-12 mx-auto text-slate-600 mb-4"></i>
                <p class="text-slate-400">Nenhum registro encontrado.</p>
            </div>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-900 py-8 bg-slate-950/50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-xs text-slate-600 uppercase tracking-widest font-semibold"></p>
        </div>
    </footer>

    <script>
        // URL da sua API atualizada (Google Apps Script)
        const API_URL = 'https://script.google.com/macros/s/AKfycbyINJtVDfavjNRqWnQwpEIsoy8RI2ah5UPlkxgiVbUnFv-mXmYSO7b2EuzlVq-eVnnv/exec';
        
        let recoveryRequests = [];

        const progressStages = [
            { label: "Solicitado" }, 
            { label: "Análise" }, 
            { label: "Recuperando" }, 
            { label: "Finalizado" } 
        ];

        // Função para mascarar e-mail: l***a@gmail.com
        function maskEmail(email) {
            if (!email || !email.includes('@')) return '---';
            const [user, domain] = email.split('@');
            if (user.length <= 2) return user + "***@" + domain;
            return user.substring(0, 1) + "***" + user.slice(-1) + "@" + domain;
        }

        function getStatusByStage(stage) {
            if (stage >= 4) return 'sucesso';
            if (stage === 3) return 'recuperar';
            if (stage === 2) return 'analise';
            return 'aguardando';
        }

        function renderPlatformBadge(request) {
            const isFinished = request.stage >= 4;
            let displayUser = request.username;
            
            if (!isFinished) {
                displayUser = `@${request.username.substring(0, 3)}***`;
            }

            const badgeClass = `inline-flex items-center px-2.5 py-1 rounded-lg bg-slate-900 border border-slate-700 text-xs font-semibold text-slate-300`;
            
            return `<div class="${badgeClass} ${!isFinished ? 'opacity-60' : ''}">
                        <i data-lucide="${isFinished ? 'external-link' : 'lock'}" class="w-3 h-3 mr-1.5 ${isFinished ? 'text-indigo-400' : ''}"></i>${displayUser}
                    </div>`;
        }

        function renderProgressBar(request) {
            const stage = request.stage;
            const fillWidth = ((stage - 1) / 3) * 100;

            let steps = progressStages.map((s, i) => {
                const stepIdx = i + 1;
                const isPassed = stage > stepIdx || stage === 4;
                const isCurrent = stage === stepIdx && stage < 4;
                
                let dotClass = 'dot-pending';
                let labelClass = 'label-pending';
                let icon = stepIdx;

                if (isPassed || (stage === 4 && stepIdx === 4)) {
                    dotClass = 'dot-passed';
                    labelClass = 'label-passed';
                    icon = '<i data-lucide="check" class="w-4 h-4"></i>';
                } else if (isCurrent) {
                    dotClass = 'dot-current';
                    labelClass = 'label-current';
                }

                return `
                    <div class="progress-step">
                        <div class="progress-dot ${dotClass}">${icon}</div>
                        <span class="step-label ${labelClass}">${s.label}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="progress-wrapper">
                    <div class="progress-track"><div class="progress-fill" style="width: ${fillWidth}%"></div></div>
                    <div class="progress-steps-container">${steps}</div>
                </div>
            `;
        }

        function renderRequestCard(request) {
            const status = getStatusByStage(request.stage);
            let borderColor = 'border-slate-800';
            let shadow = 'card-shadow';
            
            if (request.stage >= 4) {
                borderColor = 'border-emerald-500/50';
                shadow = 'status-success-shadow';
            }

            const actionBtn = (request.stage >= 4) 
                ? `<button onclick="window.location.href='resgate.html?id=${request.id}'" class="mt-8 w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold rounded-xl transition flex items-center justify-center tracking-wide">
                    <i data-lucide="key" class="w-4 h-4 mr-2"></i> RESGATAR AGORA
                   </button>`
                : '';

            return `
                <div class="bg-[var(--color-bg-card)] p-6 rounded-2xl border ${borderColor} ${shadow} hover:translate-y-[-4px] transition-all duration-300">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[10px] font-black text-slate-500 tracking-tighter">PROTOCOLO</p>
                            <h3 class="text-white font-bold">#${request.id}</h3>
                        </div>
                        <span class="text-[9px] font-bold px-2 py-1 rounded bg-slate-800 text-slate-400 border border-slate-700 uppercase">${status}</span>
                    </div>

                    <div class="flex items-center space-x-4 mb-6">
                        <div class="w-12 h-12 rounded-full bg-indigo-900/30 border border-indigo-500/20 flex items-center justify-center text-indigo-400 font-bold">
                            ${request.name.substring(0, 2).toUpperCase()}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <p class="text-white font-semibold truncate">${request.name}</p>
                            <div class="mt-1">${renderPlatformBadge(request)}</div>
                        </div>
                    </div>

                    <div class="space-y-2 mb-6">
                        <div class="flex justify-between text-[11px]">
                            <span class="text-slate-500">Solicitado em:</span>
                            <span class="text-slate-300">${request.date}</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-slate-500">E-mail vinculado:</span>
                            <span class="text-slate-300 font-mono">${maskEmail(request.email)}</span>
                        </div>
                    </div>

                    ${renderProgressBar(request)}
                    ${actionBtn}
                </div>
            `;
        }

        async function initTracker() {
            // Atualiza o Ano no Footer
            document.querySelector('footer p').innerHTML = `Sistema de Monitoramento de Contas &copy; ${new Date().getFullYear()}`;
            
            // Relógio
            const now = new Date();
            document.getElementById('current-time').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            // Carrega dados da planilha
            const container = document.getElementById('requests-container');
            container.innerHTML = '<div class="col-span-full text-center py-10"><div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div><p>Sincronizando com a planilha...</p></div>';

            try {
                const response = await fetch(API_URL);
                recoveryRequests = await response.json();
                renderRequests(recoveryRequests);
            } catch (error) {
                container.innerHTML = '<p class="col-span-full text-center text-red-400">Erro ao carregar dados. Verifique a conexão ou as permissões da API.</p>';
                console.error(error);
            }
        }

        function renderRequests(list) {
            const container = document.getElementById('requests-container');
            const noRes = document.getElementById('no-results');
            container.innerHTML = '';
            
            if (list.length === 0) {
                noRes.classList.remove('hidden');
                return;
            }
            
            noRes.classList.add('hidden');
            list.forEach(r => container.innerHTML += renderRequestCard(r));
            lucide.createIcons();
        }

        function applyFilters() {
            const name = document.getElementById('filter-name').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            
            const filtered = recoveryRequests.filter(r => {
                const matchName = r.name.toLowerCase().includes(name) || r.username.toLowerCase().includes(name);
                let matchStatus = true;
                
                const currentStatus = getStatusByStage(r.stage);
                if (status !== "") matchStatus = (currentStatus === status);
                
                return matchName && matchStatus;
            });
            
            renderRequests(filtered);
        }

        function clearFilters() {
            document.getElementById('filter-name').value = '';
            document.getElementById('filter-status').value = '';
            renderRequests(recoveryRequests);
        }
    </script>
</body>
</html>
