<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LF | Gerar Link de Afiliado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #070e17;
            background-image: radial-gradient(circle at 1px 1px, rgba(79, 70, 229, 0.15) 1px, transparent 0);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-8 text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
            <div class="p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-600/20">
                <i data-lucide="megaphone" class="w-8 h-8 text-white"></i>
            </div>
            <div class="text-left">
                <h1 class="text-2xl font-bold tracking-tight">LF<span class="text-indigo-400">Acessoria</span></h1>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Painel de Afiliados</p>
            </div>
        </div>
    </header>

    <main class="max-w-md w-full">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-xl font-bold mb-2">Seja um indicador</h2>
                <p class="text-slate-400 text-sm mb-8">Gere seu link personalizado e acompanhe seus lucros em tempo real.</p>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Seu Nome Completo</label>
                        <input type="text" id="nome" maxlength="25" placeholder="Ex: João Silva" 
                               class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl focus:ring-2 ring-indigo-500 outline-none text-white transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Seu WhatsApp (Login)</label>
                        <input type="text" id="whatsapp" placeholder="(00) 00000-0000" 
                               class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl focus:ring-2 ring-indigo-500 outline-none text-white transition-all">
                    </div>

                    <button onclick="gerarLink()" id="btnGerar" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-3 active:scale-95">
                        GERAR LINK <i data-lucide="zap" class="w-5 h-5"></i>
                    </button>
                </div>

                <div id="resultado" class="hidden mt-8 pt-8 border-t border-slate-800 animate-in fade-in zoom-in duration-300">
                    <p class="text-xs font-bold text-indigo-400 mb-3 uppercase">Link gerado com sucesso:</p>
                    
                    <div class="flex items-center gap-2 bg-slate-950 p-2 rounded-2xl border border-indigo-500/30">
                        <input type="text" id="linkFinal" readonly class="bg-transparent text-sm w-full outline-none px-3 text-slate-300 font-medium">
                        <button onclick="copiarERedirecionar()" class="p-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl transition-all group flex items-center gap-2">
                            <span class="text-xs font-bold text-white">COPIAR</span>
                            <i data-lucide="copy" class="w-4 h-4 text-white"></i>
                        </button>
                    </div>
                    
                    <p class="text-[10px] text-slate-500 mt-4 text-center">
                        Ao clicar em copiar, você será levado ao seu <span class="text-slate-300 font-bold">Painel de Controle</span>.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwrjV4LszsFCgu4xjj0gNKUT-PmqtJHyNZtiLS2qWSssCTuzLxohmygd7Yu4D3rZ1TNgA/exec';

        // Máscara Telefone
        document.getElementById('whatsapp').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 5) v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            else if (v.length > 0) v = v.replace(/^(\d*)/, "($1");
            e.target.value = v;
        });

        // Iniciais Maiúsculas
        document.getElementById('nome').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\b\w/g, l => l.toUpperCase());
            e.target.value = v.slice(0, 25);
        });

        async function gerarLink() {
            const nome = document.getElementById('nome').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const btn = document.getElementById('btnGerar');

            if (nome.length < 3 || whatsapp.length < 14) {
                alert("Preencha seu nome e WhatsApp corretamente.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        token_secreto: "RecoveryPro2024!@#SuperSeguro",
                        tipo_entrada: "novo_indicador",
                        nome: nome,
                        whatsapp: whatsapp
                    })
                });

                // Link curto usando o nome
                const linkFinal = "https://recupera.pages.dev/solicitar.html?ref=" + encodeURIComponent(nome);
                document.getElementById('linkFinal').value = linkFinal;
                document.getElementById('resultado').classList.remove('hidden');
                btn.innerHTML = `LINK GERADO!`;
                btn.classList.replace('bg-indigo-600', 'bg-emerald-600');

            } catch (error) {
                alert("Erro ao salvar. Tente novamente.");
                btn.disabled = false;
                btn.innerHTML = `GERAR LINK <i data-lucide="zap" class="w-5 h-5"></i>`;
            }
        }

        function copiarERedirecionar() {
            const input = document.getElementById('linkFinal');
            input.select();
            navigator.clipboard.writeText(input.value);
            
            alert("Link copiado! Entrando no seu painel...");
            
            // Pequeno delay para o usuário ler o alerta e redireciona
            setTimeout(() => {
                window.location.href = 'perfil.html';
            }, 500);
        }

        lucide.createIcons();
    </script>
</body>
</html>
