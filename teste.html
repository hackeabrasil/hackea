<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Estilo - Passo 1</title>
    <style>
        /* Tudo o que é visual está aqui dentro */
        body {
            background-color: #09090b;
            color: #ffffff;
            font-family: sans-serif; /* Usa a fonte padrão do sistema */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
        }

        .card {
            background-color: #18181b;
            border: 1px solid #27272a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #a1a1aa;
            margin-bottom: 25px;
        }

        button {
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>LF Assessoria</h1>
            <p>esse é um teste</p>
            <button type="button">Botão de Teste</button>
        </div>
    </div>

</body>
</html>
