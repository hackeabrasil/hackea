<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LF Assessoria | Teste de Design</title>
    <style>
        /* DESIGN PREMIUM SEM LINKS EXTERNOS */
        body {
            background-color: #09090b;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            background: rgba(24, 24, 27, 0.8);
            border-bottom: 1px solid #27272a;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -1px;
        }

        .logo span { color: #6366f1; }

        .card {
            background-color: #18181b;
            border: 1px solid #27272a;
            padding: 40px;
            border-radius: 32px;
            max-width: 350px;
            width: 85%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #a1a1aa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 700;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">LF <span>Assessoria</span></div>
    </div>

    <div class="card">
        <h1>Teste de <br>Design</h1>
        <p>esse é um teste</p>
        <button class="btn">BOTÃO BONITO</button>
    </div>

</body>
</html>
