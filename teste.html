<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Estilo - Passo 3 (Tailwind)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS mínimo apenas para o efeito de vidro que o Tailwind puro não faz fácil */
        body { font-family: 'Inter', sans-serif; }
        
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen flex flex-col items-center">

    <nav class="w-full p-6 text-center border-b border-zinc-800 mb-12">
        <div class="text-xl font-extrabold tracking-tighter">
            LF <span class="text-indigo-500">Assessoria</span>
        </div>
    </nav>

    <div class="glass-effect bg-zinc-900/60 border border-white/10 p-10 rounded-[30px] max-w-[350px] w-[90%] text-center shadow-2xl">
        
        <h1 class="text-4xl font-black mb-4 leading-none tracking-tight">
            Teste <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500">Tailwind</span>
        </h1>
        
        <p class="text-zinc-400 leading-relaxed mb-8">
            Se este card estiver preto com bordas arredondadas e o texto colorido, o Tailwind está funcionando no seu celular.
        </p>
        
        <button class="w-full py-4 px-8 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-full font-bold flex items-center justify-center gap-3 hover:scale-105 transition-transform">
            <i class="fa-solid fa-check-double"></i>
            Finalizar Teste
        </button>
    </div>

</body>
</html>
