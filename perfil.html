<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel | LF Assessoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070e17; background-image: radial-gradient(circle at 1px 1px, rgba(79, 70, 229, 0.1) 1px, transparent 0); background-size: 25px 25px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full">
        <!-- ÁREA DE LOGIN (Aparece se não houver login automático) -->
        <div id="loginArea" class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-600/30">
                <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Acessar Painel</h2>
            <p class="text-slate-400 text-sm mb-8">Digite seu WhatsApp para gerenciar seus ganhos.</p>
            
            <div class="space-y-4">
                <input type="text" id="loginTel" placeholder="(00) 00000-0000" 
                       class="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl text-center text-lg font-medium focus:ring-2 ring-indigo-500 outline-none transition-all placeholder:text-slate-600">
                
                <button onclick="carregarPerfil()" id="btnEntrar" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-2 active:scale-95">
                    ACESSAR AGORA <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- DASHBOARD (Aparece após o login) -->
        <div id="dashArea" class="hidden space-y-4 animate-in fade-in zoom-in duration-500">
            <div class="bg-gradient-to-br from-indigo-600 to-violet-700 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest opacity-80" id="boasVindas">Carregando...</p>
                    <h2 class="text-4xl font-black mt-2 text-white" id="valSaldo">R$ 0,00</h2>
                    <p class="text-indigo-200 text-[10px] font-bold mt-1 uppercase">Saldo Disponível para Saque</p>
                </div>
                <i data-lucide="wallet" class="absolute -right-4 -bottom-4 w-24 h-24 text-white opacity-10"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/50 glass p-6 rounded-[2rem]">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">A Receber</p>
                    <h3 class="text-xl font-bold text-orange-400" id="valPendente">R$ 0,00</h3>
                </div>
                <div class="bg-slate-900/50 glass p-6 rounded-[2rem]">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Indicações</p>
                    <h3 class="text-xl font-bold text-white" id="valTotal">0</h3>
                </div>
            </div>

            <!-- LINK DE INDICAÇÃO -->
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2rem] space-y-3">
                <p class="text-[10px] font-bold text-slate-500 uppercase ml-1">Seu Link de Indicação</p>
                <div class="flex items-center gap-2 bg-slate-950 p-2 rounded-2xl border border-indigo-500/20">
                    <input type="text" id="linkRef" readonly class="bg-transparent text-xs w-full outline-none px-2 text-slate-400 font-mono">
                    <button onclick="copiarLink()" class="p-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all">
                        <i data-lucide="copy" class="w-4 h-4 text-white"></i>
                    </button>
                </div>
            </div>

            <!-- BOTÃO SACAR -->
            <button onclick="abrirSaque()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-2">
                <i data-lucide="arrow-up-right" class="w-5 h-5"></i> SOLICITAR SAQUE (PIX)
            </button>
            
            <button onclick="fazerLogout()" class="w-full py-3 text-slate-500 text-xs font-bold hover:text-white transition-all uppercase tracking-widest text-center">Sair do Painel</button>
        </div>

        <!-- MODAL DE SAQUE -->
        <div id="saqueArea" class="hidden animate-in slide-in-from-bottom-10 duration-300">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl text-center">
                <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="banknote" class="text-emerald-500 w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Solicitar Saque</h3>
                <p class="text-slate-400 text-xs mb-6">Mínimo para saque: R$ 25,00.<br>O valor será transferido integralmente.</p>
                
                <input type="text" id="chavePix" placeholder="Digite sua Chave PIX" 
                       class="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl text-center mb-4 focus:ring-2 ring-emerald-500 outline-none transition-all">
                
                <div class="flex gap-3">
                    <button onclick="fecharSaque()" class="w-1/3 py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold text-sm">VOLTAR</button>
                    <button onclick="confirmarSaque()" id="btnConfirmar" class="w-2/3 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold text-sm">CONFIRMAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxx9D_QOhsGhL7B9qowfIVNhKPomNo_iZmo1vF_x-BXwSnWs_1j734NPUZwDVmcrBImPA/exec';
        let dadosUser = null;

        // Máscara de Telefone
        const maskPhone = (v) => {
            v = v.replace(/\D/g, "");
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) return v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            if (v.length > 5) return v.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            if (v.length > 2) return v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            return v.length > 0 ? "(" + v : v;
        };

        document.getElementById('loginTel').addEventListener('input', (e) => e.target.value = maskPhone(e.target.value));

        // Tenta login automático ao abrir a página
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const telParam = urlParams.get('tel');
            if(telParam) {
                document.getElementById('loginTel').value = maskPhone(telParam);
                carregarPerfil();
            }
            lucide.createIcons();
        };

        async function carregarPerfil() {
            const inputTel = document.getElementById('loginTel').value;
            const tel = inputTel.replace(/\D/g, "");
            const btn = document.getElementById('btnEntrar');
            
            if(tel.length < 10) return alert("Digite o WhatsApp completo.");

            btn.disabled = true;
            btn.innerHTML = `<div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`;

            try {
                // Chama o doGet do Apps Script com action=getPerfil
                const res = await fetch(`${API_URL}?action=getPerfil&tel=${tel}`);
                dadosUser = await res.json();

                if(dadosUser.error) {
                    alert("Afiliado não encontrado. Verifique o número ou gere seu link primeiro.");
                    btn.disabled = false;
                    btn.innerHTML = `ACESSAR AGORA <i data-lucide="log-in" class="w-5 h-5"></i>`;
                    return;
                }

                // Preenche os dados no Painel
                document.getElementById('boasVindas').innerText = `Olá, ${dadosUser.nome}!`;
                document.getElementById('valSaldo').innerText = `R$ ${dadosUser.saldo.toFixed(2)}`;
                document.getElementById('valPendente').innerText = `R$ ${dadosUser.pendente.toFixed(2)}`;
                document.getElementById('valTotal').innerText = dadosUser.totalIndicados;
                
                // Gera o link de ref dinâmico
                const baseUrl = window.location.origin; // Pega o domínio atual
                document.getElementById('linkRef').value = `https://recupera.pages.dev/solicitar.html?ref=${encodeURIComponent(dadosUser.nome)}`;

                // Alterna as telas
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('dashArea').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) { 
                console.error(e);
                alert("Erro ao conectar com a base de dados."); 
                btn.disabled = false; 
                btn.innerHTML = `ACESSAR AGORA <i data-lucide="log-in" class="w-5 h-5"></i>`;
            }
        }

        function abrirSaque() {
            if(dadosUser.saldo < 25) {
                alert(`Saldo insuficiente. Você tem R$ ${dadosUser.saldo.toFixed(2)} e o mínimo é R$ 25,00.`);
                return;
            }
            document.getElementById('dashArea').classList.add('hidden');
            document.getElementById('saqueArea').classList.remove('hidden');
            lucide.createIcons();
        }

        function fecharSaque() {
            document.getElementById('saqueArea').classList.add('hidden');
            document.getElementById('dashArea').classList.remove('hidden');
        }

        async function confirmarSaque() {
            const pix = document.getElementById('chavePix').value.trim();
            if(!pix) return alert("Por favor, informe sua chave PIX para receber.");

            const btn = document.getElementById('btnConfirmar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                // Envia para o doPost com tipo: "saque"
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        token_secreto: "RecoveryPro2024!@#SuperSeguro",
                        tipo: "saque",
                        nome: dadosUser.nome,
                        whatsapp: dadosUser.tel,
                        valor: dadosUser.saldo,
                        pix: pix
                    })
                });

                alert("SOLICITAÇÃO DE SAQUE ENVIADA!\nO pagamento será realizado na sua chave PIX em breve.");
                window.location.reload();
            } catch (e) { 
                alert("Erro ao processar sua solicitação de saque."); 
                btn.disabled = false; 
                btn.innerText = "CONFIRMAR PIX";
            }
        }

        function copiarLink() {
            const el = document.getElementById('linkRef');
            el.select();
            el.setSelectionRange(0, 99999);
            document.execCommand('copy');
            
            // Feedback visual moderno
            alert("Link de indicação copiado!");
        }

        function fazerLogout() {
            window.location.href = window.location.pathname; // Limpa parâmetros da URL e recarrega
        }

        lucide.createIcons();
    </script>
</body>
</html>
